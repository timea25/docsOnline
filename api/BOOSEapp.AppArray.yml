  assemblies:
  - BOOSEapp
  namespace: BOOSEapp
  summary: >-
    Creates a new array with a fixed size, the size decides how many values the array can store.

    The isReal value decides if the array stores integers or decimal numbers.

    All elements are given a default value: 0 for integers and 0.0 for decimals.

    This makes sure the array is ready to use.
  example: []
  syntax:
    content: public AppArray(int size, bool isReal)
    parameters:
    - id: size
      type: System.Int32
      description: Number of elements in the array
    - id: isReal
      type: System.Boolean
      description: True for decimal values, false for integers
    content.vb: Public Sub New(size As Integer, isReal As Boolean)
