  assemblies:
  - BOOSEapp
  namespace: BOOSEapp
  summary: >-
    Stores a value in the array at a given index.

    If the array stores integers, the value is converted to an integer. Otherwise, it is stored as a decimal value.

    The method checks if the index is valid. If not, it throws an error to stop invalid access.
  example: []
  syntax:
    content: public void Poke(int index, double value)
    parameters:
    - id: index
      type: System.Int32
      description: Position in the array
    - id: value
      type: System.Double
      description: Value to store
    content.vb: Public Sub Poke(index As Integer, value As Double)
