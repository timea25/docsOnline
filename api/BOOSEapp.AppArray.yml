  assemblies:
  - BOOSEapp
  namespace: BOOSEapp
  summary: >-
    This class represents a custom array used in the BOOSE interpreter.

    It can store either integer or real decimal values depending on how it is created.

    The class allows values to be added using the Poke method and returned using the Peek method.

    It also checks that the index is valid to prevent errors.
