  assemblies:
  - BOOSEapp
  namespace: BOOSEapp
  summary: >-
    Gets a value from the array at a given index. The value is returned as a double, even if it is stored as an integer.

    The method checks if the index is valid. If not, it throws an error to prevent invalid access.
  example: []
  syntax:
    content: public double Peek(int index)
    parameters:
    - id: index
      type: System.Int32
      description: Position in the array
    return:
      type: System.Double
      description: The value at that index
