  assemblies:
  - BOOSEapp
  namespace: BOOSEapp
  summary: >-
    This class represents an If command in the BOOSE system. It is used to control whether a block of code should run or not.

    The condition itself is evaluated by the Parser, and this class stores the result of that condition.

    If the condition is true, the code inside the if block will run. If it is false, the block will be skipped.

    This class works together with the Parser to control program flow.
  example: []
  syntax:
    content: 'public class AppIf : ICommand'
    content.vb: Public Class AppIf Implements ICommand
