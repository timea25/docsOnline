  assemblies:
  - BOOSEapp
  namespace: BOOSEapp
  summary: >-
    Executes the circle command by drawing a circle on the canvas.

    The method first checks if the parameter is valid.

    It does not allow decimal values and ensures the radius is greater than 0.

    If the value is valid, the circle is drawn at the current pen position.
