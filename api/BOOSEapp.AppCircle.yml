  namespace: BOOSEapp
  summary: >-
    This class represents the circle command in the BOOSE system. It is used to draw a circle on the canvas using a given radius.

    The class takes one parameter, which is the size of the circle, and passes it to the canvas to perform the drawing.

    It also checks that the value is valid before drawing, ensuring that the radius is a positive number and not a decimal.
