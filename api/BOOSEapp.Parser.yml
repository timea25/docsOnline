  assemblies:
  - BOOSEapp
  namespace: BOOSEapp
  summary: >-
    This class is responsible for reading and processing BOOSE code.

    It acts as a custom parser that prepares the program before execution.

    The parser handles : variables (int and real), arrays (create, poke, peek), control structures (if, else, while)

    and mathematical expressions.

    It converts the user input into a final version of the program where all variables are replaced with actual values

    and only valid commands are passed to the BOOSE system.

    This class works as the main logic controller.
