    id: Parse
    path: Parser.cs
    startLine: 42
  assemblies:
  - BOOSEapp
  namespace: BOOSEapp
  summary: >-
    Processes the BOOSE program line by line.

    The method reads the input code and performs several tasks: clears old variables before starting, 

    handles control structures (if, else, while), processes variable declarations and updates, evaluates expressions,

    replaces variables with their values.

    The final result is a clean version of the program that can be executed by the BOOSE engine.
  example: []
  syntax:
    content: public string Parse(string input)
    parameters:
    - id: input
      type: System.String
      description: The BOOSE program written by the user
    return:
      type: System.String
      description: The parsed program with values replaced
    content.vb: Public Function Parse(input As String) As String
  overload: BOOSEapp.Parser.Parse*
  nameWithType.vb: Parser.Parse(String)
  fullName.vb: BOOSEapp.Parser.Parse(String)
  name.vb: Parse(String)
