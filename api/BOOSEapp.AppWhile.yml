  assemblies:
  - BOOSEapp
  namespace: BOOSEapp
  summary: >-
    This class represents a While command in the BOOSE system.

    It is used to repeat a block of code while a condition is true.

    The condition is evaluated by the Parser and this class works together with the Parser to control the loop.

    As long as the condition is true, the commands inside the while block will continue to run. When the condition becomes false,

    the loop stops.

    This class helps manage repetition in BOOSE programs.
  example: []
  syntax:
    content: 'public class AppWhile : ICommand'
    content.vb: Public Class AppWhile Implements ICommand
