  summary: >-
    This class contains unit tests for the AppArray class.

    It checks that the array works correctly when it is created,

    when values are stored using Poke, and when values are retrieved using Peek.

    It also tests error handling by checking that invalid indexes throw exceptions.

    These tests help ensure that the AppArray class behaves correctly in different situations.
