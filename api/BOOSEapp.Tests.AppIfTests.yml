  summary: >-
    This class contains unit tests for the AppIf command. It checks that the command can be created and executed safely.

    Since the main logic of the If statement is handled by the Parser,

    these tests focus on ensuring that the AppIf class does not crash and behaves correctly when its methods are called.

    These tests help confirm that the class works correctly within the overall BOOSE system.
