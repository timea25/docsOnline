  assemblies:
  - BOOSEapp
  namespace: BOOSEapp
  summary: >-
    This class represents the rectangle command in the BOOSE system.

    It is used to draw a rectangle on the canvas using a given width and height.

    The command takes two integer values which define the size of the rectangle.

    The rectangle is drawn starting from the current pen position.

    The class also checks that the values are valid before drawing ensuring that width and height are positive integers.
