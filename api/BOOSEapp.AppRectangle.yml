    id: Execute
    path: AppRectangle.cs
    startLine: 50
  assemblies:
  - BOOSEapp
  namespace: BOOSEapp
  summary: >-
    Executes the rectangle command by drawing a rectangle on the canvas.

    The method first checks that both parameters are valid integers.

    It does not allow decimal values and ensures that width and height are greater than 0.

    If the values are valid the rectangle is drawn at the current pen position.
