  assemblies:
  - BOOSEapp
  namespace: BOOSEapp
  summary: >-
    This class represents the MoveTo command in the BOOSE system. It is used to change the current drawing position on the canvas.

    The command takes two integer values, X and Y, which represent the new position of the pen.

    No drawing is done when this command is used. It only moves the pen to a new location,

    so the next drawing command starts from that position.
