    id: Execute
    path: AppMoveTo.cs
    startLine: 49
  assemblies:
  - BOOSEapp
  namespace: BOOSEapp
  summary: >-
    Executes the MoveTo command by moving the pen to a new position.

    The method first checks that the parameters are valid integers.

    It does not allow decimal values and ensures that both X and Y are not negative.

    If the values are valid, the pen position is updated on the canvas.
  example: []
